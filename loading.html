<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SCANNING — VEHICLE TRACE</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --cyan: #00f5c4;
    --dark: #020c10;
    --border: #0a3d2e;
    --red: #ff2a5e;
    --glow: 0 0 20px #00f5c455;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--dark);
    color: var(--cyan);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
    cursor: none;
  }

  .cursor { position:fixed;width:20px;height:20px;border:2px solid var(--cyan);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);mix-blend-mode:screen; }
  .cursor::after { content:'';position:absolute;width:4px;height:4px;background:var(--cyan);border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%); }

  .bg-grid { position:fixed;inset:0;background-image:linear-gradient(rgba(0,245,196,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,245,196,0.04) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0; }
  .scanline { position:fixed;top:-100%;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,var(--cyan),transparent);opacity:0.4;animation:scan 4s linear infinite;z-index:1;pointer-events:none; }
  @keyframes scan{to{top:110%;}}

  canvas#particles { position:fixed;inset:0;z-index:0;pointer-events:none;opacity:0.4; }

  .corner { position:fixed;width:60px;height:60px;z-index:2;pointer-events:none; }
  .corner::before,.corner::after { content:'';position:absolute;background:var(--cyan); }
  .corner-tl{top:20px;left:20px;} .corner-tl::before{width:2px;height:40px;top:0;left:0;} .corner-tl::after{width:40px;height:2px;top:0;left:0;}
  .corner-tr{top:20px;right:20px;} .corner-tr::before{width:2px;height:40px;top:0;right:0;} .corner-tr::after{width:40px;height:2px;top:0;right:0;}
  .corner-bl{bottom:20px;left:20px;} .corner-bl::before{width:2px;height:40px;bottom:0;left:0;} .corner-bl::after{width:40px;height:2px;bottom:0;left:0;}
  .corner-br{bottom:20px;right:20px;} .corner-br::before{width:2px;height:40px;bottom:0;right:0;} .corner-br::after{width:40px;height:2px;bottom:0;right:0;}

  .status-bar { position:fixed;top:0;left:0;right:0;height:36px;background:rgba(0,245,196,0.05);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:20px;font-size:11px;z-index:100;backdrop-filter:blur(6px); }
  .status-dot { width:8px;height:8px;border-radius:50%;background:var(--cyan);animation:blink 1.5s infinite;box-shadow:0 0 6px var(--cyan); }
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}
  .status-bar .right { margin-left:auto;display:flex;gap:20px; }

  /* MAIN */
  .main {
    position: relative;
    z-index: 10;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 20px 40px;
    gap: 32px;
  }

  /* RADAR */
  .radar-wrap {
    position: relative;
    width: 180px;
    height: 180px;
    animation: fadeIn 0.5s ease both;
  }
  @keyframes fadeIn{from{opacity:0;transform:scale(0.8)}to{opacity:1;transform:scale(1)}}

  .radar-ring {
    position: absolute;
    border-radius: 50%;
    border: 1px solid rgba(0,245,196,0.2);
    top: 50%; left: 50%;
    transform: translate(-50%,-50%);
  }
  .radar-ring:nth-child(1) { width: 60px; height: 60px; }
  .radar-ring:nth-child(2) { width: 100px; height: 100px; }
  .radar-ring:nth-child(3) { width: 140px; height: 140px; }
  .radar-ring:nth-child(4) { width: 180px; height: 180px; border-color: rgba(0,245,196,0.4); }

  .radar-cross {
    position: absolute;
    inset: 0;
  }
  .radar-cross::before {
    content: '';
    position: absolute;
    top: 50%; left: 0; right: 0;
    height: 1px;
    background: rgba(0,245,196,0.15);
  }
  .radar-cross::after {
    content: '';
    position: absolute;
    left: 50%; top: 0; bottom: 0;
    width: 1px;
    background: rgba(0,245,196,0.15);
  }

  .radar-sweep {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    animation: sweep 2s linear infinite;
    background: conic-gradient(from 0deg, rgba(0,245,196,0) 0deg, rgba(0,245,196,0.4) 30deg, rgba(0,245,196,0) 60deg, rgba(0,245,196,0) 360deg);
  }
  @keyframes sweep { to { transform: rotate(360deg); } }

  .radar-dot {
    position: absolute;
    width: 6px; height: 6px;
    background: var(--cyan);
    border-radius: 50%;
    box-shadow: 0 0 10px var(--cyan);
    top: 30%; left: 60%;
    animation: dotBlink 0.8s infinite;
  }
  @keyframes dotBlink { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.3;transform:scale(0.5)} }

  .radar-center {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    width: 8px; height: 8px;
    background: var(--cyan);
    border-radius: 50%;
    box-shadow: 0 0 15px var(--cyan);
  }

  /* PANEL */
  .panel {
    width: 100%;
    max-width: 500px;
    background: rgba(4,15,20,0.85);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    backdrop-filter: blur(12px);
    box-shadow: 0 0 60px rgba(0,245,196,0.06);
    position: relative;
    overflow: hidden;
    animation: fadeUp 0.6s ease 0.2s both;
  }
  @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
  .panel::before { content:'';position:absolute;top:-2px;left:20%;right:20%;height:2px;background:linear-gradient(90deg,transparent,var(--cyan),transparent);border-radius:2px; }

  .scan-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 13px;
    letter-spacing: 5px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .scan-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* LOG */
  #log {
    margin-bottom: 24px;
    min-height: 130px;
    font-size: 13px;
    line-height: 2;
  }
  .log-line {
    display: flex;
    align-items: center;
    gap: 10px;
    opacity: 0;
    transform: translateX(-10px);
    animation: lineIn 0.3s ease forwards;
  }
  @keyframes lineIn{to{opacity:1;transform:translateX(0)}}
  .log-line.ok { color: var(--cyan); }
  .log-line.warn { color: #ffdd00; }
  .log-line::before { content: ''; display: inline-block; }

  .check-icon { font-size: 10px; }

  /* PROGRESS */
  .progress-info {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    margin-bottom: 8px;
    color: rgba(0,245,196,0.6);
  }

  .bar-track {
    width: 100%;
    height: 6px;
    background: rgba(0,245,196,0.08);
    border-radius: 6px;
    overflow: hidden;
    margin-bottom: 8px;
    position: relative;
  }
  .bar-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--cyan), #00ffa0);
    border-radius: 6px;
    transition: width 0.15s ease;
    box-shadow: 0 0 10px var(--cyan);
    position: relative;
  }
  .bar-fill::after {
    content: '';
    position: absolute;
    right: 0; top: 0; bottom: 0;
    width: 20px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5));
    border-radius: 0 6px 6px 0;
  }

  .progress-pct {
    font-family: 'Orbitron', sans-serif;
    font-size: 28px;
    font-weight: 700;
    text-align: center;
    letter-spacing: 3px;
    margin-top: 12px;
    color: #fff;
    text-shadow: 0 0 20px var(--cyan);
  }

  .dev-tag {
    text-align: center;
    font-size: 10px;
    letter-spacing: 2px;
    color: rgba(0,245,196,0.3);
    margin-top: 20px;
  }
  .dev-tag span { color: rgba(0,245,196,0.6); }
</style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<div class="bg-grid"></div>
<div class="scanline"></div>
<canvas id="particles"></canvas>
<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>

<div class="status-bar">
  <div class="status-dot"></div>
  <span>SCANNING IN PROGRESS</span>
  <div class="right"><span id="clock">--:--:--</span><span>SECURE</span></div>
</div>

<div class="main">

  <!-- RADAR -->
  <div class="radar-wrap">
    <div class="radar-ring"></div>
    <div class="radar-ring"></div>
    <div class="radar-ring"></div>
    <div class="radar-ring"></div>
    <div class="radar-cross"></div>
    <div class="radar-sweep"></div>
    <div class="radar-dot"></div>
    <div class="radar-center"></div>
  </div>

  <!-- PANEL -->
  <div class="panel">
    <div class="scan-title">SCAN LOG</div>
    <div id="log"></div>

    <div class="progress-info">
      <span>PROCESSING</span>
      <span id="pct-text">0%</span>
    </div>
    <div class="bar-track">
      <div class="bar-fill" id="fill"></div>
    </div>
    <div class="progress-pct" id="pct-big">0%</div>

    <div class="dev-tag">DEVELOPED BY <span>SATYAM GUPTA</span></div>
  </div>

</div>

<script>
// cursor
const cursor = document.getElementById('cursor');
document.addEventListener('mousemove', e => {
  cursor.style.left = e.clientX + 'px';
  cursor.style.top = e.clientY + 'px';
});

// clock
setInterval(()=>{ document.getElementById('clock').textContent = new Date().toTimeString().split(' ')[0]; }, 1000);

// particles
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
let W, H, particles = [];
function resize(){ W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize(); window.addEventListener('resize', resize);
class Particle{
  constructor(){ this.x=Math.random()*W; this.y=Math.random()*H; this.size=Math.random()*1.2+0.3; this.speedX=(Math.random()-0.5)*0.3; this.speedY=(Math.random()-0.5)*0.3; this.opacity=Math.random()*0.4+0.1; }
  update(){ this.x+=this.speedX; this.y+=this.speedY; if(this.x<0)this.x=W; if(this.x>W)this.x=0; if(this.y<0)this.y=H; if(this.y>H)this.y=0; }
  draw(){ ctx.beginPath(); ctx.arc(this.x,this.y,this.size,0,Math.PI*2); ctx.fillStyle=`rgba(0,245,196,${this.opacity})`; ctx.fill(); }
}
for(let i=0;i<60;i++) particles.push(new Particle());
(function animP(){ ctx.clearRect(0,0,W,H); particles.forEach(p=>{p.update();p.draw();}); requestAnimationFrame(animP); })();

// sound
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;
function initAudio(){ if(!audioCtx) audioCtx = new AudioCtx(); }
function beep(freq=880,dur=0.08,type='square',vol=0.08){
  initAudio();
  const osc=audioCtx.createOscillator();
  const gain=audioCtx.createGain();
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.type=type; osc.frequency.setValueAtTime(freq,audioCtx.currentTime);
  gain.gain.setValueAtTime(vol,audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
  osc.start(); osc.stop(audioCtx.currentTime+dur);
}
function playTick(){ beep(800,0.04,'sine',0.05); }
function playComplete(){
  initAudio();
  [880,1100,1320,1760].forEach((f,i)=>setTimeout(()=>beep(f,0.15,'sine',0.1),i*80));
}

// main
const v = new URLSearchParams(window.location.search).get('vehicle') || '';
const log = document.getElementById('log');
const fill = document.getElementById('fill');
const pctText = document.getElementById('pct-text');
const pctBig = document.getElementById('pct-big');

function delay(ms){ return new Promise(r=>setTimeout(r,ms)); }

function addLine(text, cls='ok', icon='▸'){
  const d = document.createElement('div');
  d.className = 'log-line ' + cls;
  d.innerHTML = `<span class="check-icon">${icon}</span> ${text}`;
  log.appendChild(d);
  playTick();
}

function setProgress(p){
  fill.style.width = p + '%';
  pctText.textContent = p + '%';
  pctBig.textContent = p + '%';
}

async function start(){
  await delay(400);
  addLine('Initializing secure connection...', 'ok', '⟳');
  await delay(600);
  addLine('Server handshake complete', 'ok', '✓');
  await delay(500);
  addLine('Querying vehicle registry: <span style="color:#fff">' + v.toUpperCase() + '</span>', 'ok', '▸');
  await delay(500);
  addLine('Bypassing encryption layer...', 'warn', '⚡');
  await delay(500);
  addLine('Fetching owner & insurance data...', 'ok', '▸');
  await delay(400);
  addLine('Decrypting payload...', 'ok', '⟳');
  await delay(300);

  let p = 0;
  const interval = setInterval(async ()=>{
    p += 2;
    setProgress(p);
    if(p % 20 === 0) playTick();
    if(p >= 100){
      clearInterval(interval);
      addLine('TRACE COMPLETE — REDIRECTING', 'ok', '✓');
      playComplete();
      await delay(800);
      window.location.href = 'result.html?vehicle=' + encodeURIComponent(v);
    }
  }, 60);
}

document.addEventListener('click', ()=>{ initAudio(); }, {once:true});
start();
</script>
</body>
</html>
