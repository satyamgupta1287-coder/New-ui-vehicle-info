<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ADVANCED — VEHICLE TRACE</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --cyan: #00f5c4;
    --dark: #020c10;
    --border: #0a3d2e;
    --red: #ff2a5e;
    --gold: #ffd700;
    --glow: 0 0 20px #00f5c455;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--dark); color:var(--cyan); font-family:'Share Tech Mono',monospace; min-height:100vh; overflow-x:hidden; cursor:none; }

  .cursor{position:fixed;width:20px;height:20px;border:2px solid var(--cyan);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);mix-blend-mode:screen;}
  .cursor::after{content:'';position:absolute;width:4px;height:4px;background:var(--cyan);border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);}

  .bg-grid{position:fixed;inset:0;background-image:linear-gradient(rgba(0,245,196,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,245,196,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
  .scanline{position:fixed;top:-100%;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,var(--cyan),transparent);opacity:0.3;animation:scan 5s linear infinite;z-index:1;pointer-events:none;}
  @keyframes scan{to{top:110%;}}

  .corner{position:fixed;width:60px;height:60px;z-index:2;pointer-events:none;}
  .corner::before,.corner::after{content:'';position:absolute;background:var(--cyan);}
  .corner-tl{top:20px;left:20px;}.corner-tl::before{width:2px;height:40px;top:0;left:0;}.corner-tl::after{width:40px;height:2px;top:0;left:0;}
  .corner-tr{top:20px;right:20px;}.corner-tr::before{width:2px;height:40px;top:0;right:0;}.corner-tr::after{width:40px;height:2px;top:0;right:0;}
  .corner-bl{bottom:20px;left:20px;}.corner-bl::before{width:2px;height:40px;bottom:0;left:0;}.corner-bl::after{width:40px;height:2px;bottom:0;left:0;}
  .corner-br{bottom:20px;right:20px;}.corner-br::before{width:2px;height:40px;bottom:0;right:0;}.corner-br::after{width:40px;height:2px;bottom:0;right:0;}

  .status-bar{position:fixed;top:0;left:0;right:0;height:36px;background:rgba(0,245,196,0.05);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:20px;font-size:11px;z-index:100;backdrop-filter:blur(6px);}
  .status-dot{width:8px;height:8px;border-radius:50%;background:var(--gold);animation:blink 1.5s infinite;box-shadow:0 0 6px var(--gold);}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}
  .status-bar .right{margin-left:auto;display:flex;gap:20px;}

  .main { position:relative;z-index:10;min-height:100vh;padding:56px 16px 40px;max-width:520px;margin:auto; }

  .page-header { display:flex;align-items:center;gap:14px;padding:20px 0 24px; }
  .back-btn { display:flex;align-items:center;gap:6px;color:rgba(0,245,196,0.6);text-decoration:none;font-size:12px;letter-spacing:2px;transition:all 0.3s;cursor:none; }
  .back-btn:hover { color:var(--cyan); }
  .page-title { font-family:'Orbitron',sans-serif;font-size:16px;letter-spacing:4px;font-weight:700; }
  .page-badge { margin-left:auto;padding:4px 10px;background:rgba(255,215,0,0.1);border:1px solid rgba(255,215,0,0.3);border-radius:20px;font-size:9px;letter-spacing:1px;color:var(--gold); }

  /* CAR IMAGE */
  .car-img-wrap {
    position: relative;
    border-radius: 14px;
    overflow: hidden;
    margin-bottom: 18px;
    border: 1px solid var(--border);
    display: none;
  }
  .car-img-wrap img {
    width: 100%;
    display: block;
    filter: brightness(0.85) saturate(1.2);
  }
  .car-img-wrap::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(2,12,16,0.8) 0%, transparent 50%);
  }
  .car-img-overlay {
    position: absolute;
    bottom: 14px; left: 14px;
    z-index: 2;
    font-family: 'Orbitron', sans-serif;
    font-size: 11px;
    letter-spacing: 3px;
    color: rgba(255,255,255,0.8);
  }

  /* CARD */
  .card {
    background: rgba(4,15,20,0.9);
    border: 1px solid var(--border);
    border-radius: 14px;
    margin-bottom: 14px;
    overflow: hidden;
    opacity: 0;
    transform: translateY(15px);
    transition: opacity 0.4s ease, transform 0.4s ease;
  }
  .card.visible { opacity:1; transform:translateY(0); }

  .card-header {
    display:flex;align-items:center;gap:10px;padding:14px 18px;border-bottom:1px solid var(--border);background:rgba(0,245,196,0.03);
  }
  .card-title { font-family:'Orbitron',sans-serif;font-size:11px;letter-spacing:3px;font-weight:700;color:var(--cyan); }
  .card-badge { margin-left:auto;padding:3px 8px;background:rgba(0,245,196,0.1);border:1px solid rgba(0,245,196,0.2);border-radius:20px;font-size:9px;letter-spacing:1px;color:rgba(0,245,196,0.6); }

  .card-body { padding:16px 18px; }

  .data-row { display:flex;justify-content:space-between;align-items:flex-start;padding:8px 0;border-bottom:1px solid rgba(0,245,196,0.05);font-size:13px;gap:12px;opacity:0;animation:rowIn 0.3s ease forwards; }
  .data-row:last-child{border-bottom:none;}
  @keyframes rowIn{to{opacity:1}}
  .data-key { color:rgba(0,245,196,0.5);min-width:100px;font-size:11px;letter-spacing:1px; }
  .data-val { color:#fff;text-align:right;word-break:break-all; }
  .data-val.highlight { color:var(--cyan);font-weight:bold; }
  .data-val.masked { color:rgba(255,255,255,0.3);letter-spacing:4px;font-size:16px; }

  /* NESTED */
  .nested-card {
    background: rgba(0,245,196,0.02);
    border: 1px solid rgba(0,245,196,0.08);
    border-radius: 10px;
    padding: 12px 14px;
    margin-top: 8px;
    margin-bottom: 8px;
  }
  .nested-title { font-size:10px;letter-spacing:3px;color:rgba(0,245,196,0.4);margin-bottom:8px; }

  /* LOCK BOX */
  .lock-box {
    background: rgba(255,215,0,0.04);
    border: 1px solid rgba(255,215,0,0.2);
    border-radius: 12px;
    padding: 20px;
    margin: 8px 0;
    text-align: center;
  }
  .lock-icon { font-size: 32px; margin-bottom: 10px; }
  .lock-title { font-family:'Orbitron',sans-serif;font-size:12px;letter-spacing:3px;color:var(--gold);margin-bottom:6px; }
  .lock-sub { font-size:11px;color:rgba(255,255,255,0.4);margin-bottom:16px;letter-spacing:1px; }

  .unlock-btn {
    padding: 12px 24px;
    background: transparent;
    border: 1.5px solid var(--gold);
    border-radius: 10px;
    color: var(--gold);
    font-family: 'Orbitron', sans-serif;
    font-size: 12px;
    letter-spacing: 3px;
    cursor: none;
    transition: all 0.3s;
    width: 100%;
    position: relative;
    overflow: hidden;
  }
  .unlock-btn-bg { position:absolute;inset:0;background:linear-gradient(135deg,var(--gold),#ffaa00);transform:translateX(-101%);transition:transform 0.4s cubic-bezier(0.4,0,0.2,1); }
  .unlock-btn:hover .unlock-btn-bg { transform:translateX(0); }
  .unlock-btn-text { position:relative;z-index:2;transition:color 0.3s; }
  .unlock-btn:hover .unlock-btn-text { color:#000; }

  .key-input-wrap { margin-top: 14px; display:none; }
  .key-input {
    width:100%;padding:12px 16px;background:rgba(0,0,0,0.4);border:1px solid rgba(255,215,0,0.3);border-radius:10px;color:var(--gold);font-family:'Share Tech Mono',monospace;font-size:15px;letter-spacing:4px;outline:none;text-transform:uppercase;text-align:center;transition:all 0.3s;
  }
  .key-input:focus { border-color:var(--gold);box-shadow:0 0 20px rgba(255,215,0,0.2); }
  .key-submit { margin-top:10px;width:100%;padding:12px;background:linear-gradient(135deg,var(--gold),#ffaa00);border:none;border-radius:10px;color:#000;font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700;letter-spacing:3px;cursor:none;transition:all 0.3s; }
  .key-submit:active { transform:scale(0.97); }

  /* UNLOCK RESULT */
  .unlock-result {
    background: rgba(0,245,196,0.06);
    border: 1px solid rgba(0,245,196,0.25);
    border-radius: 12px;
    padding: 16px 18px;
    margin-top: 14px;
    display: none;
  }
  .unlock-result .ur-title { font-family:'Orbitron',sans-serif;font-size:11px;letter-spacing:3px;color:var(--cyan);margin-bottom:12px;display:flex;align-items:center;gap:8px; }

  .error-box{background:rgba(255,42,94,0.08);border:1px solid rgba(255,42,94,0.3);border-radius:12px;padding:16px;text-align:center;color:#ff2a5e;font-size:13px;}

  .dev-tag{text-align:center;font-size:10px;letter-spacing:2px;color:rgba(0,245,196,0.3);padding-bottom:20px;}
  .dev-tag span{color:rgba(0,245,196,0.6);}

  .loading-state{text-align:center;padding:40px 20px;color:rgba(0,245,196,0.4);font-size:13px;letter-spacing:2px;}
  .loading-dots::after{content:'...';animation:dots 1.5s infinite;}
  @keyframes dots{0%{content:'.'}33%{content:'..'}66%{content:'...'}}
</style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<div class="bg-grid"></div>
<div class="scanline"></div>
<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>

<div class="status-bar">
  <div class="status-dot"></div>
  <span>ADVANCED ACCESS</span>
  <div class="right"><span id="clock">--:--:--</span><span style="color:#ffd700">RESTRICTED</span></div>
</div>

<div class="main">
  <div class="page-header">
    <a href="javascript:history.back()" class="back-btn">⬅ BACK</a>
    <div class="page-title">ADVANCED</div>
    <div class="page-badge">⭐ PREMIUM</div>
  </div>

  <div class="car-img-wrap" id="carImgWrap">
    <img id="carImg" src="" alt="Vehicle">
    <div class="car-img-overlay">VEHICLE PROFILE IMAGE</div>
  </div>

  <div id="output">
    <div class="loading-state"><span class="loading-dots">LOADING ADVANCED DATA</span></div>
  </div>

  <div class="dev-tag" style="margin-top:20px">DEVELOPED BY <span>SATYAM GUPTA</span></div>
</div>

<script>
const cursor = document.getElementById('cursor');
document.addEventListener('mousemove', e => { cursor.style.left=e.clientX+'px'; cursor.style.top=e.clientY+'px'; });
setInterval(()=>{ document.getElementById('clock').textContent=new Date().toTimeString().split(' ')[0]; },1000);
document.addEventListener('click',()=>initAudio(),{once:true});

const AudioCtx=window.AudioContext||window.webkitAudioContext; let audioCtx;
function initAudio(){if(!audioCtx)audioCtx=new AudioCtx();}
function beep(freq=880,dur=0.06,type='sine',vol=0.06){initAudio();const o=audioCtx.createOscillator();const g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);o.type=type;o.frequency.setValueAtTime(freq,audioCtx.currentTime);g.gain.setValueAtTime(vol,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);o.start();o.stop(audioCtx.currentTime+dur);}
function playUnlock(){ [528,660,880,1320].forEach((f,i)=>setTimeout(()=>beep(f,0.2,'sine',0.08),i*60)); }
function playError(){ beep(200,0.3,'sawtooth',0.1); }

const ACCESS_KEY = 'SATYAM123';
const vehicle = new URLSearchParams(location.search).get('vehicle') || '';
const out = document.getElementById('output');
let dataStore = null, unlocked = false;

function delay(ms){return new Promise(r=>setTimeout(r,ms));}

function cleanKey(key){
  return key.replace(/^v_/,'').replace(/_/g,' ').replace(/\b(rc)\b/i,'RC').replace(/\bid\b/i,'ID').replace(/\burl\b/i,'URL').replace(/\bno\b/i,'No').replace('Vehicle Chasi Number','Chassis Number').replace('Vehicle Engine Number','Engine Number').replace(/\b\w/g,c=>c.toUpperCase());
}

async function renderSection(title, data, parentEl){
  if(!data) return;

  const card = document.createElement('div');
  card.className = 'card';
  const safeId = title.replace(/\s/g,'_') + '_' + Math.random().toString(36).slice(2,6);
  card.innerHTML = `
    <div class="card-header">
      <span class="card-title">📦 ${title}</span>
      <span class="card-badge">FULL DATA</span>
    </div>
    <div class="card-body" id="cb-${safeId}"></div>
  `;
  parentEl.appendChild(card);
  await delay(50);
  card.classList.add('visible');
  beep(600+Math.random()*300,0.06,'sine',0.04);

  const body = card.querySelector('.card-body');
  let idx = 0;

  for(const key in data){
    const val = data[key];
    const clean = cleanKey(key);
    const isSensitive = key.toLowerCase().includes('engine') || key.toLowerCase().includes('chasi');

    if(typeof val === 'object' && val !== null){
      const nested = document.createElement('div');
      nested.className = 'nested-card';
      nested.innerHTML = `<div class="nested-title">📂 ${clean.toUpperCase()}</div>`;
      body.appendChild(nested);
      await renderSection(clean.toUpperCase(), val, body);
    } else {
      const row = document.createElement('div');
      row.className = 'data-row';
      row.style.animationDelay = (idx*35)+'ms';
      const isHL = clean.toLowerCase().includes('name')||clean.toLowerCase().includes('number');
      const displayVal = isSensitive ? `<span class="data-val masked">● ● ● ● ● ●</span>` : `<span class="data-val ${isHL?'highlight':''}">${val ?? 'N/A'}</span>`;
      row.innerHTML = `<span class="data-key">${clean}</span>${displayVal}`;
      body.appendChild(row);
      idx++;
      await delay(20);
    }
  }

  // Add unlock section at end of main data card
  if(title === 'FULL VEHICLE DATA'){
    const lockBox = document.createElement('div');
    lockBox.id = 'lockBox';
    lockBox.innerHTML = `
      <div class="lock-box">
        <div class="lock-icon">🔒</div>
        <div class="lock-title">RESTRICTED ACCESS</div>
        <div class="lock-sub">Engine & Chassis numbers require an access key</div>
        <button class="unlock-btn" onclick="showKeyInput()">
          <div class="unlock-btn-bg"></div>
          <span class="unlock-btn-text">🔓 UNLOCK SENSITIVE DATA</span>
        </button>
        <div class="key-input-wrap" id="keyInputWrap">
          <input class="key-input" id="keyInput" placeholder="ENTER ACCESS KEY" onkeydown="if(event.key==='Enter')checkKey()">
          <button class="key-submit" onclick="checkKey()">VERIFY &amp; UNLOCK</button>
        </div>
      </div>
      <div class="unlock-result" id="unlockResult">
        <div class="ur-title">✓ ACCESS GRANTED</div>
        <div id="unlockData"></div>
      </div>
    `;
    out.appendChild(lockBox);
  }
}

function showKeyInput(){
  beep(880,0.1,'sine',0.06);
  document.getElementById('keyInputWrap').style.display = 'block';
  setTimeout(()=>document.getElementById('keyInput').focus(),100);
}

function checkKey(){
  const k = document.getElementById('keyInput').value.trim().toUpperCase();
  if(k === ACCESS_KEY){
    playUnlock();
    showUnlocked();
  } else {
    playError();
    document.getElementById('keyInput').style.borderColor = '#ff2a5e';
    document.getElementById('keyInput').value = '';
    setTimeout(()=>document.getElementById('keyInput').style.borderColor='',800);
  }
}

async function showUnlocked(){
  if(unlocked||!dataStore) return;
  unlocked = true;
  const res = document.getElementById('unlockResult');
  const d = document.getElementById('unlockData');
  res.style.display = 'block';

  const engineKey = Object.keys(dataStore).find(k=>k.toLowerCase().includes('engine'));
  const chasiKey = Object.keys(dataStore).find(k=>k.toLowerCase().includes('chasi'));

  const rows = [
    ['Engine Number', dataStore[engineKey] || dataStore.vehicle_engine_number || 'N/A'],
    ['Chassis Number', dataStore[chasiKey] || dataStore.vehicle_chasi_number || 'N/A'],
  ];

  for(const [k,v] of rows){
    const row = document.createElement('div');
    row.className = 'data-row';
    row.style.opacity = '0';
    row.innerHTML = `<span class="data-key">${k}</span><span class="data-val highlight">${v}</span>`;
    d.appendChild(row);
    await delay(100);
    row.style.opacity = '1';
    row.style.transition = 'opacity 0.3s';
  }
  res.scrollIntoView({behavior:'smooth'});
}

async function start(){
  try {
    const res = await fetch('https://ft-osint-aih3.onrender.com/api/vehicle?key=free1day&vehicle=' + encodeURIComponent(vehicle));
    const json = await res.json();
    const d = json?.data || json;
    dataStore = d;

    // car image
    const imgUrl = d?.modelData?.profile_image_url;
    if(imgUrl){
      const wrap = document.getElementById('carImgWrap');
      document.getElementById('carImg').src = imgUrl;
      wrap.style.display = 'block';
    }

    out.innerHTML = '';
    await renderSection('FULL VEHICLE DATA', d, out);

  } catch(e){
    out.innerHTML = '<div class="error-box">❌ Failed to load advanced data.</div>';
  }
}

start();
</script>
</body>
</html>
