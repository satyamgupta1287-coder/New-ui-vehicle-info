<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TRACE RESULT</title>

<style>
body{
  background:#020c10;
  color:#00ffc3;
  font-family:monospace;
  padding:20px;
}

h2{margin-bottom:10px}

.card{
  border:1px solid #0a3d2e;
  padding:15px;
  margin-bottom:12px;
  border-radius:10px;
  background:#041014;
}

.row{
  display:flex;
  justify-content:space-between;
  padding:6px 0;
  border-bottom:1px solid #083028;
}

.row:last-child{border:none}

.key{color:#00ffaa99}
.val{color:#fff;text-align:right}

.error{color:red}
.loading{color:#aaa}

/* 🔥 BUTTON ANIMATION */
#advWrap{
  margin-top:30px;
  text-align:center;
  opacity:0;
  transform:translateY(40px);
  transition:all 0.6s ease;
}

#advBtn{
  padding:16px 22px;
  background:linear-gradient(135deg,#00ffc3,#00ffa0);
  border:none;
  border-radius:12px;
  font-weight:bold;
  font-size:14px;
  letter-spacing:2px;
  cursor:pointer;
}
</style>
</head>

<body>

<h2>⚡ TRACE RESULT</h2>

<div id="vehicle"></div>

<div id="output">
  <div class="loading">Loading...</div>
</div>

<!-- 🔥 ADV BUTTON -->
<div id="advWrap">
  <button id="advBtn" onclick="goAdvanced()">
    <span id="advText"></span>
  </button>
</div>

<script>

const vehicle = new URLSearchParams(location.search).get("vehicle");
document.getElementById("vehicle").innerText = vehicle || "No vehicle";

/* 🔥 typing effect */
async function typeText(el, text, speed=35){
  el.innerHTML="";
  for(let i=0;i<text.length;i++){
    el.innerHTML += text[i];
    await new Promise(r=>setTimeout(r,speed));
  }
}

/* 🔥 scroll */
function autoScroll(){
  const el=document.getElementById("advWrap");
  setTimeout(()=>{
    el.scrollIntoView({behavior:"smooth"});
  },300);
}

/* 🔥 show button */
async function showAdvancedButton(){
  const wrap=document.getElementById("advWrap");
  const textEl=document.getElementById("advText");

  wrap.style.opacity="1";
  wrap.style.transform="translateY(0)";

  await typeText(textEl,"⚡ VIEW ADVANCED DETAILS");

  autoScroll();
}

/* 🔥 redirect */
function goAdvanced(){
  location.href="advanced.html?vehicle="+encodeURIComponent(vehicle);
}

/* 🔥 UI section */
function createSection(title,obj){
  let html="<div class='card'><h3>"+title+"</h3>";

  for(let k in obj){
    if(!obj[k]) continue;
    html+=`
      <div class="row">
        <div class="key">${k}</div>
        <div class="val">${obj[k]}</div>
      </div>
    `;
  }

  html+="</div>";
  document.getElementById("output").innerHTML+=html;
}

/* 🔥 main */
async function load(){

  try{

    const res = await fetch('/api/vehicle?rc='+encodeURIComponent(vehicle));
    const data = await res.json();

    const out=document.getElementById("output");
    out.innerHTML="";

    if(!data || data.error){
      out.innerHTML="<div class='error'>No Data Found</div>";
      return;
    }

    createSection("OWNER DETAILS",{
      "Owner Name":data["Owner Name"],
      "Father Name":data["Father's Name"],
      "City":data["City Name"],
      "Address":data["Address"],
      "Phone":data["Phone"]
    });

    createSection("VEHICLE INFO",{
      "Model":data["Maker Model"],
      "Company":data["Model Name"],
      "Fuel":data["Fuel Type"],
      "Class":data["Vehicle Class"],
      "RTO":data["Registered RTO"],
      "Reg Date":data["Registration Date"]
    });

    createSection("INSURANCE",{
      "Company":data["Insurance Company"],
      "Policy No":data["Insurance No"],
      "Expiry":data["Insurance Expiry"]
    });

    createSection("IMPORTANT",{
      "Fitness":data["Fitness Upto"],
      "PUC":data["PUC Upto"],
      "Tax":data["Tax Upto"]
    });

    /* 🔥 SHOW BUTTON AFTER LOAD */
    setTimeout(showAdvancedButton,500);

  }catch(e){
    document.getElementById("output").innerHTML="<div class='error'>API Failed</div>";
  }
}

load();

</script>

</body>
</html>
