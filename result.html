<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TRACE RESULT — VEHICLE TRACE</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --cyan: #00f5c4;
    --dark: #020c10;
    --panel: #040f14;
    --border: #0a3d2e;
    --green: #00ff80;
    --glow: 0 0 20px #00f5c455;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--dark); color:var(--cyan); font-family:'Share Tech Mono',monospace; min-height:100vh; overflow-x:hidden; cursor:none; }

  .cursor{position:fixed;width:20px;height:20px;border:2px solid var(--cyan);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);mix-blend-mode:screen;}
  .cursor::after{content:'';position:absolute;width:4px;height:4px;background:var(--cyan);border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);}

  .bg-grid{position:fixed;inset:0;background-image:linear-gradient(rgba(0,245,196,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,245,196,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
  .scanline{position:fixed;top:-100%;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,var(--cyan),transparent);opacity:0.3;animation:scan 5s linear infinite;z-index:1;pointer-events:none;}
  @keyframes scan{to{top:110%;}}

  .corner{position:fixed;width:60px;height:60px;z-index:2;pointer-events:none;}
  .corner::before,.corner::after{content:'';position:absolute;background:var(--cyan);}
  .corner-tl{top:20px;left:20px;}.corner-tl::before{width:2px;height:40px;top:0;left:0;}.corner-tl::after{width:40px;height:2px;top:0;left:0;}
  .corner-tr{top:20px;right:20px;}.corner-tr::before{width:2px;height:40px;top:0;right:0;}.corner-tr::after{width:40px;height:2px;top:0;right:0;}
  .corner-bl{bottom:20px;left:20px;}.corner-bl::before{width:2px;height:40px;bottom:0;left:0;}.corner-bl::after{width:40px;height:2px;bottom:0;left:0;}
  .corner-br{bottom:20px;right:20px;}.corner-br::before{width:2px;height:40px;bottom:0;right:0;}.corner-br::after{width:40px;height:2px;bottom:0;right:0;}

  .status-bar{position:fixed;top:0;left:0;right:0;height:36px;background:rgba(0,245,196,0.05);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:20px;font-size:11px;z-index:100;backdrop-filter:blur(6px);}
  .status-dot{width:8px;height:8px;border-radius:50%;background:var(--cyan);animation:blink 1.5s infinite;box-shadow:0 0 6px var(--cyan);}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}
  .status-bar .right{margin-left:auto;display:flex;gap:20px;}

  .main { position:relative; z-index:10; min-height:100vh; padding:56px 16px 40px; max-width:520px; margin:auto; }

  /* HEADER */
  .page-header {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 20px 0 24px;
  }
  .back-btn {
    display: flex; align-items: center; gap: 6px;
    color: rgba(0,245,196,0.6);
    text-decoration: none;
    font-size: 12px;
    letter-spacing: 2px;
    transition: all 0.3s;
    cursor: none;
  }
  .back-btn:hover { color: var(--cyan); }

  .page-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 16px;
    letter-spacing: 4px;
    font-weight: 700;
  }

  /* VEHICLE BADGE */
  .vehicle-badge {
    background: linear-gradient(135deg, rgba(0,245,196,0.06), rgba(0,0,0,0));
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 20px;
    animation: slideIn 0.4s ease both;
  }
  @keyframes slideIn{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}

  .badge-icon { font-size: 30px; filter: drop-shadow(0 0 10px var(--cyan)); }
  .badge-plate {
    font-family: 'Orbitron', sans-serif;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 4px;
    color: #fff;
  }
  .badge-label { font-size: 10px; color: rgba(0,245,196,0.4); letter-spacing: 2px; margin-top: 2px; }

  /* SECTION CARDS */
  .card {
    background: rgba(4,15,20,0.9);
    border: 1px solid var(--border);
    border-radius: 14px;
    margin-bottom: 14px;
    overflow: hidden;
    opacity: 0;
    transform: translateY(15px);
    transition: opacity 0.4s ease, transform 0.4s ease;
    box-shadow: 0 4px 30px rgba(0,0,0,0.4);
  }
  .card.visible { opacity:1; transform:translateY(0); }

  .card-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    background: rgba(0,245,196,0.03);
  }
  .card-icon { font-size: 16px; }
  .card-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 11px;
    letter-spacing: 3px;
    font-weight: 700;
    color: var(--cyan);
  }
  .card-badge {
    margin-left: auto;
    padding: 3px 8px;
    background: rgba(0,245,196,0.1);
    border: 1px solid rgba(0,245,196,0.2);
    border-radius: 20px;
    font-size: 9px;
    letter-spacing: 1px;
    color: rgba(0,245,196,0.6);
  }

  .card-body { padding: 16px 18px; }

  .data-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 8px 0;
    border-bottom: 1px solid rgba(0,245,196,0.05);
    font-size: 13px;
    gap: 12px;
    opacity: 0;
    animation: rowIn 0.3s ease forwards;
  }
  .data-row:last-child { border-bottom: none; }
  @keyframes rowIn{to{opacity:1}}

  .data-key { color: rgba(0,245,196,0.5); min-width: 100px; font-size: 11px; letter-spacing: 1px; }
  .data-val { color: #fff; text-align: right; word-break: break-all; }
  .data-val.highlight { color: var(--cyan); font-weight: bold; }

  /* LOADING STATE */
  .loading-state {
    text-align: center;
    padding: 40px 20px;
    color: rgba(0,245,196,0.4);
    font-size: 13px;
    letter-spacing: 2px;
  }
  .loading-dots::after {
    content: '...';
    animation: dots 1.5s infinite;
  }
  @keyframes dots{0%{content:'.'}33%{content:'..'}66%{content:'...'}}

  /* ERROR */
  .error-box {
    background: rgba(255,42,94,0.08);
    border: 1px solid rgba(255,42,94,0.3);
    border-radius: 12px;
    padding: 20px;
    text-align: center;
    color: #ff2a5e;
    font-size: 13px;
  }

  /* ADV BUTTON */
  .adv-wrap {
    margin: 20px 0 30px;
    display: none;
    animation: fadeIn 0.5s ease both;
  }
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  .adv-btn {
    width: 100%;
    padding: 17px;
    background: transparent;
    border: 1.5px solid var(--cyan);
    border-radius: 12px;
    color: var(--dark);
    font-family: 'Orbitron', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 3px;
    cursor: none;
    position: relative;
    overflow: hidden;
    transition: all 0.3s;
  }
  .adv-btn-bg { position:absolute;inset:0;background:linear-gradient(135deg,var(--cyan),#00ffa0);transform:translateX(-101%);transition:transform 0.4s cubic-bezier(0.4,0,0.2,1); }
  .adv-btn:hover .adv-btn-bg { transform:translateX(0); }
  .adv-btn-text { position:relative;z-index:2;color:var(--cyan);transition:color 0.3s; }
  .adv-btn:hover .adv-btn-text { color:var(--dark); }

  .dev-tag{text-align:center;font-size:10px;letter-spacing:2px;color:rgba(0,245,196,0.3);padding-bottom:20px;}
  .dev-tag span{color:rgba(0,245,196,0.6);}
</style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<div class="bg-grid"></div>
<div class="scanline"></div>
<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>

<div class="status-bar">
  <div class="status-dot"></div>
  <span>DATA RETRIEVED</span>
  <div class="right"><span id="clock">--:--:--</span><span>ENCRYPTED</span></div>
</div>

<div class="main">
  <div class="page-header">
    <a href="index.html" class="back-btn">⬅ BACK</a>
    <div class="page-title">TRACE RESULT</div>
  </div>

  <div class="vehicle-badge" id="vbadge" style="display:none">
    <div class="badge-icon">🚗</div>
    <div>
      <div class="badge-plate" id="badge-plate">—</div>
      <div class="badge-label">REGISTERED VEHICLE</div>
    </div>
  </div>

  <div id="output">
    <div class="loading-state"><span class="loading-dots">FETCHING DATA</span></div>
  </div>

  <div class="adv-wrap" id="advBtn">
    <button class="adv-btn" onclick="goAdvanced()">
      <div class="adv-btn-bg"></div>
      <span class="adv-btn-text">⟩ VIEW ADVANCED DETAILS</span>
    </button>
  </div>

  <div class="dev-tag">DEVELOPED BY <span>SATYAM GUPTA</span></div>
</div>

<script>
const cursor = document.getElementById('cursor');
document.addEventListener('mousemove', e => { cursor.style.left=e.clientX+'px'; cursor.style.top=e.clientY+'px'; });
document.querySelectorAll('button,a').forEach(el=>{ el.addEventListener('mouseenter',()=>cursor.style.transform='translate(-50%,-50%) scale(2)'); el.addEventListener('mouseleave',()=>cursor.style.transform='translate(-50%,-50%) scale(1)'); });
setInterval(()=>{ document.getElementById('clock').textContent=new Date().toTimeString().split(' ')[0]; },1000);

const AudioCtx=window.AudioContext||window.webkitAudioContext; let audioCtx;
function initAudio(){if(!audioCtx)audioCtx=new AudioCtx();}
function beep(freq=880,dur=0.06,type='sine',vol=0.06){initAudio();const o=audioCtx.createOscillator();const g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);o.type=type;o.frequency.setValueAtTime(freq,audioCtx.currentTime);g.gain.setValueAtTime(vol,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);o.start();o.stop(audioCtx.currentTime+dur);}
document.addEventListener('click',()=>initAudio(),{once:true});

const vehicle = new URLSearchParams(location.search).get('vehicle') || '';
const out = document.getElementById('output');

function delay(ms){return new Promise(r=>setTimeout(r,ms));}

const ICONS = {
  'OWNER DETAILS': '👤',
  'VEHICLE INFO': '🚗',
  'INSURANCE': '🛡️',
  'IMPORTANT DETAILS': '📋',
};

async function showSection(title, data){
  if(!data || Object.keys(data).length === 0) return;
  const card = document.createElement('div');
  card.className = 'card';
  const icon = ICONS[title] || '📄';

  card.innerHTML = `
    <div class="card-header">
      <span class="card-icon">${icon}</span>
      <span class="card-title">${title}</span>
      <span class="card-badge">VERIFIED</span>
    </div>
    <div class="card-body" id="body-${title.replace(/\s/g,'_')}"></div>
  `;
  out.appendChild(card);

  // animate in
  await delay(50);
  card.classList.add('visible');
  beep(600+Math.random()*200, 0.08, 'sine', 0.05);

  const body = card.querySelector('.card-body');
  let rowIdx = 0;
  for(const key in data){
    const row = document.createElement('div');
    row.className = 'data-row';
    row.style.animationDelay = (rowIdx * 40) + 'ms';

    const val = data[key] ?? 'N/A';
    const isHighlight = key.toLowerCase().includes('name') || key.toLowerCase().includes('number');

    row.innerHTML = `
      <span class="data-key">${key}</span>
      <span class="data-val ${isHighlight ? 'highlight' : ''}">${val}</span>
    `;
    body.appendChild(row);
    rowIdx++;
    await delay(30);
  }
}


async function start(){
  if(!vehicle){
    out.innerHTML='<div class="error-box">❌ No vehicle number provided</div>';
    document.getElementById('advBtn').style.display='block';
    return;
  }

  document.getElementById('badge-plate').textContent = vehicle.toUpperCase();
  document.getElementById('vbadge').style.display = 'flex';

  try {
    const res = await fetch('/api/vehicle?rc=' + encodeURIComponent(vehicle));
    const r = await res.json();
    out.innerHTML = '';

    if(!r || typeof r !== 'object' || r.error){
      out.innerHTML = '<div class="error-box">❌ No data found for this vehicle</div>';
    } else {
      const ownerKeys   = ['Owner Name',"Father's Name",'Address','City Name','Phone','Owner Serial No','Financier Name'];
      const vehicleKeys = ['Maker Model','Model Name','Vehicle Class','Fuel Type','Fuel Norms','Registered RTO','Registration Date'];
      const insurKeys   = ['Insurance Company','Insurance No','Insurance Upto','Insurance Expiry'];
      const dateKeys    = ['Fitness Upto','Tax Upto','PUC No','PUC Upto'];

      function buildSection(keys){
        const obj = {};
        keys.forEach(k => { if(r[k] !== undefined && r[k] !== null && r[k] !== '') obj[k] = r[k]; });
        return obj;
      }

      await showSection('OWNER DETAILS',     buildSection(ownerKeys));
      await showSection('VEHICLE INFO',      buildSection(vehicleKeys));
      await showSection('INSURANCE',         buildSection(insurKeys));
      await showSection('IMPORTANT DETAILS', buildSection(dateKeys));

      const allHandled = [...ownerKeys,...vehicleKeys,...insurKeys,...dateKeys,'copyright'];
      const extra = {};
      Object.keys(r).forEach(k => { if(!allHandled.includes(k)) extra[k] = r[k]; });
      if(Object.keys(extra).length) await showSection('OTHER DETAILS', extra);

      beep(880,0.15,'sine',0.1);
      setTimeout(()=>beep(1100,0.15,'sine',0.08), 100);
    }
  } catch(e){
    out.innerHTML = '<div class="error-box">❌ Error: ' + e.message + '</div>';
  }

  document.getElementById('advBtn').style.display = 'block';
  setTimeout(()=>document.getElementById('advBtn').scrollIntoView({behavior:'smooth'}), 300);
}

function goAdvanced(){ location.href = 'advanced.html?vehicle=' + encodeURIComponent(vehicle); }

start();
</script>
</body>
</html>
