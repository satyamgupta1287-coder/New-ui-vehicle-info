<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VEHICLE TRACE — SYSTEM</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --cyan: #00f5c4;
    --cyan2: #00c8a0;
    --dark: #020c10;
    --panel: #040f14;
    --border: #0a3d2e;
    --glow: 0 0 20px #00f5c455;
    --red: #ff2a5e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--dark);
    color: var(--cyan);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
    cursor: none;
  }

  /* CUSTOM CURSOR */
  .cursor {
    position: fixed;
    width: 20px; height: 20px;
    border: 2px solid var(--cyan);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    transition: width 0.2s, height 0.2s, border-color 0.2s;
    mix-blend-mode: screen;
  }
  .cursor::after {
    content: '';
    position: absolute;
    width: 4px; height: 4px;
    background: var(--cyan);
    border-radius: 50%;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
  }
  .cursor.expand { width: 40px; height: 40px; border-color: var(--red); }

  /* GRID BACKGROUND */
  .bg-grid {
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,245,196,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,245,196,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* SCAN LINE */
  .scanline {
    position: fixed;
    top: -100%;
    left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, transparent, var(--cyan), transparent);
    opacity: 0.4;
    animation: scan 4s linear infinite;
    z-index: 1;
    pointer-events: none;
  }
  @keyframes scan { to { top: 110%; } }

  /* PARTICLES */
  canvas#particles {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    opacity: 0.5;
  }

  /* CORNER DECORATIONS */
  .corner {
    position: fixed;
    width: 60px; height: 60px;
    z-index: 2;
    pointer-events: none;
  }
  .corner::before, .corner::after {
    content: '';
    position: absolute;
    background: var(--cyan);
  }
  .corner-tl { top: 20px; left: 20px; }
  .corner-tl::before { width: 2px; height: 40px; top: 0; left: 0; }
  .corner-tl::after { width: 40px; height: 2px; top: 0; left: 0; }
  .corner-tr { top: 20px; right: 20px; }
  .corner-tr::before { width: 2px; height: 40px; top: 0; right: 0; }
  .corner-tr::after { width: 40px; height: 2px; top: 0; right: 0; }
  .corner-bl { bottom: 20px; left: 20px; }
  .corner-bl::before { width: 2px; height: 40px; bottom: 0; left: 0; }
  .corner-bl::after { width: 40px; height: 2px; bottom: 0; left: 0; }
  .corner-br { bottom: 20px; right: 20px; }
  .corner-br::before { width: 2px; height: 40px; bottom: 0; right: 0; }
  .corner-br::after { width: 40px; height: 2px; bottom: 0; right: 0; }

  /* STATUS BAR */
  .status-bar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 36px;
    background: rgba(0,245,196,0.05);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 20px;
    font-size: 11px;
    z-index: 100;
    backdrop-filter: blur(6px);
  }
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--cyan);
    animation: blink 1.5s infinite;
    box-shadow: 0 0 6px var(--cyan);
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
  .status-bar .right { margin-left: auto; display: flex; gap: 20px; }

  /* MAIN WRAPPER */
  .main {
    position: relative;
    z-index: 10;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 20px 40px;
  }

  /* LOGO / TITLE */
  .logo-wrap {
    text-align: center;
    margin-bottom: 40px;
    animation: fadeDown 0.8s ease both;
  }
  @keyframes fadeDown { from { opacity:0; transform:translateY(-30px); } to { opacity:1; transform:translateY(0); } }

  .logo-icon {
    font-size: 52px;
    display: block;
    margin-bottom: 10px;
    filter: drop-shadow(0 0 20px var(--cyan));
    animation: floatIcon 3s ease-in-out infinite;
  }
  @keyframes floatIcon {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  .logo-title {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(22px, 5vw, 36px);
    font-weight: 900;
    letter-spacing: 6px;
    text-transform: uppercase;
    background: linear-gradient(135deg, #fff 0%, var(--cyan) 50%, #00ffa0 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: none;
    position: relative;
  }
  .logo-title::after {
    content: attr(data-text);
    position: absolute;
    left: 0; top: 0;
    -webkit-text-fill-color: transparent;
    background: linear-gradient(135deg, #fff, var(--cyan));
    -webkit-background-clip: text;
    filter: blur(12px);
    opacity: 0.4;
  }

  .logo-sub {
    font-size: 11px;
    letter-spacing: 4px;
    color: rgba(0,245,196,0.5);
    margin-top: 6px;
  }

  /* PANEL */
  .panel {
    width: 100%;
    max-width: 480px;
    background: rgba(4,15,20,0.85);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px 28px;
    backdrop-filter: blur(12px);
    box-shadow: 0 0 60px rgba(0,245,196,0.08), inset 0 0 30px rgba(0,0,0,0.4);
    animation: fadeUp 0.9s ease 0.2s both;
    position: relative;
    overflow: hidden;
  }
  @keyframes fadeUp { from { opacity:0; transform:translateY(30px); } to { opacity:1; transform:translateY(0); } }

  .panel::before {
    content: '';
    position: absolute;
    top: -2px; left: 20%; right: 20%; height: 2px;
    background: linear-gradient(90deg, transparent, var(--cyan), transparent);
    border-radius: 2px;
  }

  /* PLATE DISPLAY */
  .plate-wrap {
    position: relative;
    margin-bottom: 24px;
  }

  .plate-label {
    font-size: 10px;
    letter-spacing: 3px;
    color: rgba(0,245,196,0.4);
    margin-bottom: 8px;
  }

  .plate {
    width: 100%;
    padding: 18px 20px;
    background: linear-gradient(135deg, #0a1a14, #030e0a);
    border: 1.5px solid var(--cyan);
    border-radius: 12px;
    text-align: center;
    font-family: 'Orbitron', sans-serif;
    font-size: 24px;
    font-weight: 700;
    letter-spacing: 6px;
    color: #fff;
    box-shadow: var(--glow), inset 0 0 20px rgba(0,245,196,0.05);
    animation: plateGlow 2.5s ease-in-out infinite alternate;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
  }
  .plate::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 60%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(0,245,196,0.1), transparent);
    animation: plateSheen 3s ease-in-out infinite;
  }
  @keyframes plateSheen { 0%,100%{left:-100%} 50%{left:150%} }
  @keyframes plateGlow {
    from { box-shadow: 0 0 15px rgba(0,245,196,0.3), inset 0 0 15px rgba(0,245,196,0.03); }
    to   { box-shadow: 0 0 35px rgba(0,245,196,0.6), inset 0 0 25px rgba(0,245,196,0.08); }
  }

  /* PLATE CORNERS */
  .plate-corner {
    position: absolute;
    width: 10px; height: 10px;
    border-color: var(--cyan);
    border-style: solid;
    opacity: 0.7;
  }
  .plate-corner.tl { top: 4px; left: 4px; border-width: 2px 0 0 2px; }
  .plate-corner.tr { top: 4px; right: 4px; border-width: 2px 2px 0 0; }
  .plate-corner.bl { bottom: 4px; left: 4px; border-width: 0 0 2px 2px; }
  .plate-corner.br { bottom: 4px; right: 4px; border-width: 0 2px 2px 0; }

  /* INPUT */
  .input-wrap {
    position: relative;
    margin-bottom: 14px;
  }
  .input-wrap svg {
    position: absolute;
    left: 14px; top: 50%;
    transform: translateY(-50%);
    width: 18px; height: 18px;
    stroke: rgba(0,245,196,0.5);
    fill: none;
  }

  input {
    width: 100%;
    padding: 16px 16px 16px 46px;
    background: rgba(0,0,0,0.5);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    color: var(--cyan);
    font-family: 'Share Tech Mono', monospace;
    font-size: 16px;
    letter-spacing: 3px;
    outline: none;
    transition: all 0.3s;
    text-transform: uppercase;
  }
  input::placeholder { color: rgba(0,245,196,0.25); letter-spacing: 2px; }
  input:focus {
    border-color: var(--cyan);
    box-shadow: var(--glow);
    background: rgba(0,245,196,0.03);
  }

  /* SCAN BUTTON */
  .btn {
    width: 100%;
    padding: 17px;
    background: transparent;
    border: 1.5px solid var(--cyan);
    border-radius: 12px;
    color: var(--dark);
    font-family: 'Orbitron', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 4px;
    cursor: none;
    position: relative;
    overflow: hidden;
    transition: all 0.3s;
    margin-bottom: 24px;
    text-transform: uppercase;
  }
  .btn-bg {
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, var(--cyan), #00ffa0);
    transform: translateX(-101%);
    transition: transform 0.4s cubic-bezier(0.4,0,0.2,1);
  }
  .btn:hover .btn-bg { transform: translateX(0); }
  .btn-text {
    position: relative;
    z-index: 2;
    color: var(--cyan);
    transition: color 0.3s;
  }
  .btn:hover .btn-text { color: var(--dark); }
  .btn-pulse {
    position: absolute;
    inset: 0;
    border-radius: 12px;
    animation: btnPulse 2s infinite;
  }
  @keyframes btnPulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(0,245,196,0.3); }
    50% { box-shadow: 0 0 0 8px rgba(0,245,196,0); }
  }

  /* DIVIDER */
  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 0 0 20px;
    color: rgba(0,245,196,0.3);
    font-size: 10px;
    letter-spacing: 2px;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* SOCIAL LINKS */
  .socials {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
  }
  .social-btn {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 12px;
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: rgba(0,245,196,0.7);
    text-decoration: none;
    font-size: 12px;
    letter-spacing: 1px;
    transition: all 0.3s;
    cursor: none;
  }
  .social-btn:hover {
    border-color: var(--cyan);
    color: var(--cyan);
    box-shadow: var(--glow);
    transform: translateY(-2px);
  }
  .social-btn img { width: 18px; filter: brightness(0) invert(1) sepia(1) hue-rotate(130deg) saturate(3); }

  /* FOOTER */
  .footer {
    text-align: center;
    font-size: 10px;
    letter-spacing: 2px;
    color: rgba(0,245,196,0.3);
    line-height: 1.8;
    margin-top: 4px;
  }
  .footer span { color: rgba(0,245,196,0.6); }

  /* GLITCH EFFECT ON TITLE */
  @keyframes glitch {
    0%,100% { text-shadow: none; transform: none; }
    20% { text-shadow: -2px 0 #ff2a5e; transform: translateX(2px); }
    40% { text-shadow: 2px 0 #00f5c4; transform: translateX(-2px); }
    60% { text-shadow: -2px 0 #ff2a5e; transform: translateX(1px); }
  }
  .logo-title:hover { animation: glitch 0.4s ease; }

  /* RING ANIMATION */
  .ring-wrap {
    position: absolute;
    top: -80px; right: -80px;
    width: 200px; height: 200px;
    opacity: 0.07;
    pointer-events: none;
  }
  .ring {
    position: absolute;
    border-radius: 50%;
    border: 1px solid var(--cyan);
    animation: ringPulse 3s ease-in-out infinite;
  }
  .ring:nth-child(1) { inset: 20px; animation-delay: 0s; }
  .ring:nth-child(2) { inset: 40px; animation-delay: 0.5s; }
  .ring:nth-child(3) { inset: 60px; animation-delay: 1s; }
  @keyframes ringPulse {
    0%,100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.1); opacity: 0.5; }
  }

  /* NOISE OVERLAY */
  .noise {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    opacity: 0.025;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
  }

  /* RIPPLE */
  .ripple {
    position: absolute;
    border-radius: 50%;
    background: rgba(0,245,196,0.3);
    transform: scale(0);
    animation: rippleAnim 0.6s linear;
    pointer-events: none;
  }
  @keyframes rippleAnim { to { transform: scale(4); opacity: 0; } }

</style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<div class="bg-grid"></div>
<div class="scanline"></div>
<div class="noise"></div>
<canvas id="particles"></canvas>

<!-- CORNERS -->
<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>

<!-- STATUS BAR -->
<div class="status-bar">
  <div class="status-dot"></div>
  <span>SYSTEM ONLINE</span>
  <span>SECURE CONNECTION</span>
  <span>v2.4.1</span>
  <div class="right">
    <span id="clock">--:--:--</span>
    <span>ENC:AES256</span>
  </div>
</div>

<!-- MAIN -->
<div class="main">
  <div class="logo-wrap">
    <span class="logo-icon">🛰️</span>
    <div class="logo-title" data-text="VEHICLE TRACE">VEHICLE TRACE</div>
    <div class="logo-sub">ADVANCED INTELLIGENCE SYSTEM</div>
  </div>

  <div class="panel">
    <div class="ring-wrap">
      <div class="ring"></div>
      <div class="ring"></div>
      <div class="ring"></div>
    </div>

    <div class="plate-wrap">
      <div class="plate-label">// LIVE PLATE PREVIEW</div>
      <div class="plate" id="plate">
        <span class="plate-corner tl"></span>
        <span class="plate-corner tr"></span>
        <span class="plate-corner bl"></span>
        <span class="plate-corner br"></span>
        HR·00·XX·0000
      </div>
    </div>

    <div class="input-wrap">
      <svg viewBox="0 0 24 24" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z"/></svg>
      <input id="vehicle" placeholder="ENTER VEHICLE NUMBER" oninput="updatePlate()" onkeydown="handleKey(event)">
    </div>

    <button class="btn" onclick="go()" id="scanBtn">
      <div class="btn-bg"></div>
      <div class="btn-pulse"></div>
      <span class="btn-text">⟩ INITIATE SCAN</span>
    </button>

    <div class="divider">CONNECT</div>

    <div class="socials">
      <a class="social-btn" href="https://www.instagram.com/satyam_________gupta?igsh=MTJhNTIwZGQ4anF2Zg==" target="_blank">
        <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png"> Instagram
      </a>
      <a class="social-btn" href="https://t.me/satyamgupta9999" target="_blank">
        <img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png"> Telegram
      </a>
    </div>

    <div class="footer">
      <div>⚠ EDUCATIONAL USE ONLY — AUTHORIZED ACCESS PERMITTED</div>
      <div>DEVELOPED BY <span>SATYAM GUPTA</span> &nbsp;|&nbsp; ALL RIGHTS RESERVED</div>
    </div>
  </div>
</div>

<script>
// ─── CURSOR ───────────────────────────────────────
const cursor = document.getElementById('cursor');
document.addEventListener('mousemove', e => {
  cursor.style.left = e.clientX + 'px';
  cursor.style.top = e.clientY + 'px';
});
document.querySelectorAll('button, a, input').forEach(el => {
  el.addEventListener('mouseenter', () => cursor.classList.add('expand'));
  el.addEventListener('mouseleave', () => cursor.classList.remove('expand'));
});

// ─── CLOCK ────────────────────────────────────────
function updateClock(){
  const n = new Date();
  document.getElementById('clock').textContent =
    n.toTimeString().split(' ')[0];
}
setInterval(updateClock, 1000);
updateClock();

// ─── PARTICLES ────────────────────────────────────
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
let W, H, particles = [];

function resize(){
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

class Particle {
  constructor(){
    this.x = Math.random() * W;
    this.y = Math.random() * H;
    this.size = Math.random() * 1.5 + 0.5;
    this.speedX = (Math.random() - 0.5) * 0.4;
    this.speedY = (Math.random() - 0.5) * 0.4;
    this.opacity = Math.random() * 0.5 + 0.1;
  }
  update(){
    this.x += this.speedX;
    this.y += this.speedY;
    if(this.x < 0) this.x = W;
    if(this.x > W) this.x = 0;
    if(this.y < 0) this.y = H;
    if(this.y > H) this.y = 0;
  }
  draw(){
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
    ctx.fillStyle = `rgba(0,245,196,${this.opacity})`;
    ctx.fill();
  }
}

for(let i=0; i<80; i++) particles.push(new Particle());

function animParticles(){
  ctx.clearRect(0,0,W,H);
  // draw connections
  for(let i=0;i<particles.length;i++){
    for(let j=i+1;j<particles.length;j++){
      const dx=particles[i].x-particles[j].x;
      const dy=particles[i].y-particles[j].y;
      const dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<120){
        ctx.beginPath();
        ctx.strokeStyle=`rgba(0,245,196,${0.08*(1-dist/120)})`;
        ctx.lineWidth=0.5;
        ctx.moveTo(particles[i].x,particles[i].y);
        ctx.lineTo(particles[j].x,particles[j].y);
        ctx.stroke();
      }
    }
    particles[i].update();
    particles[i].draw();
  }
  requestAnimationFrame(animParticles);
}
animParticles();

// ─── SOUND ENGINE ─────────────────────────────────
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;

function initAudio(){
  if(!audioCtx) audioCtx = new AudioCtx();
}

function beep(freq=880, dur=0.08, type='square', vol=0.1){
  initAudio();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.type = type;
  osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
  gain.gain.setValueAtTime(vol, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  osc.start();
  osc.stop(audioCtx.currentTime + dur);
}

function playScanSound(){
  initAudio();
  [440,660,880,1100].forEach((f,i)=>{
    setTimeout(()=>beep(f,0.12,'sawtooth',0.08),i*60);
  });
}

function playKeySound(){
  beep(1200 + Math.random()*200, 0.05, 'sine', 0.05);
}

function playErrorSound(){
  beep(200,0.3,'sawtooth',0.15);
  setTimeout(()=>beep(150,0.3,'sawtooth',0.1),150);
}

// ─── PLATE UPDATE ─────────────────────────────────
const plateEl = document.getElementById('plate');

function updatePlate(){
  playKeySound();
  const v = document.getElementById('vehicle').value.toUpperCase().trim();
  plateEl.textContent = v || 'HR·00·XX·0000';

  // flash effect
  plateEl.style.borderColor = '#00ffa0';
  setTimeout(()=>plateEl.style.borderColor='', 200);
}

function handleKey(e){
  if(e.key === 'Enter') go();
}

// ─── RIPPLE ───────────────────────────────────────
document.getElementById('scanBtn').addEventListener('click', function(e){
  const r = document.createElement('span');
  r.classList.add('ripple');
  const rect = this.getBoundingClientRect();
  const size = Math.max(rect.width, rect.height);
  r.style.width = r.style.height = size + 'px';
  r.style.left = (e.clientX - rect.left - size/2) + 'px';
  r.style.top = (e.clientY - rect.top - size/2) + 'px';
  this.appendChild(r);
  setTimeout(()=>r.remove(), 700);
});

// ─── GO ───────────────────────────────────────────
function go(){
  const v = document.getElementById('vehicle').value.trim();
  if(!v){
    playErrorSound();
    document.getElementById('vehicle').style.borderColor='#ff2a5e';
    document.getElementById('vehicle').style.boxShadow='0 0 20px rgba(255,42,94,0.4)';
    setTimeout(()=>{
      document.getElementById('vehicle').style.borderColor='';
      document.getElementById('vehicle').style.boxShadow='';
    }, 1000);
    return;
  }
  playScanSound();
  document.querySelector('.btn-text').textContent = '⟩ SCANNING...';
  setTimeout(()=>{
    window.location.href = 'loading.html?vehicle=' + encodeURIComponent(v);
  }, 600);
}
</script>
</body>
